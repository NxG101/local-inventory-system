<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<div class="login-logo">STOCK.</div>

<div class="login-title">Create Admin Account</div>
<div class="login-sub">Owner permission required</div>

<div class="error-msg" id="error"></div>

<form class="login-form" id="signup-form">

<div class="form-group">
<input type="text" id="newUser" placeholder="Username" required>
</div>

<div class="form-group">
<input type="password" id="newPass" placeholder="Password" required>
</div>

<div class="form-group">
<input type="password" id="adminKey" placeholder="Admin Key" required>
</div>

<button class="btn login-btn">Create Account</button>

</form>

<div class="login-footer">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</div>

<script>

const OWNER_KEY = "OWNER123";

document.getElementById("signup-form").addEventListener("submit",function(e){

e.preventDefault();

let user = document.getElementById("newUser").value;
let pass = document.getElementById("newPass").value;
let key  = document.getElementById("adminKey").value;

let error = document.getElementById("error");

if(key !== OWNER_KEY){

error.style.display="block";
error.innerText="Invalid Admin Key. Please ask the owner.";

return;

}

localStorage.setItem("adminUser",user);
localStorage.setItem("adminPass",pass);

alert("Admin account created successfully!");

window.location.href="login.html";

});

</script>

</body>
</html>

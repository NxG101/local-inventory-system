<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<div class="login-logo">STOCK.</div>

<div class="login-title">Create Admin Account</div>
<div class="login-sub">Owner permission required</div>

<div class="error-msg" id="error" style="display:none;"></div>

<form class="login-form" id="signup-form">

<div class="form-group">
<input type="email" id="newEmail" placeholder="Email (e.g. sample@stock.com)"  required>
</div>

<div class="form-group">
<input type="password" id="newPassword" placeholder="Password" required>
</div>

<div class="form-group">
<input type="password" id="adminKey" placeholder="Admin Key" required>
</div>

<button class="btn login-btn">Create Account</button>

</form>

<div class="login-footer">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</div>

<script type="module">
import { createAdmin } from "./script.js";

document.getElementById("signup-form").addEventListener("submit", function(e){
    e.preventDefault();
    createAdmin();
});
</script>

<!-- GLOBAL NOTIFICATION BAR -->
<div id="notification" class="notification">
    <div class="notification-content">
        <span id="notification-message"></span>
    </div>
    <button class="notification-close" onclick="hideNotification()">×</button>
</div>    

</body>
</html>

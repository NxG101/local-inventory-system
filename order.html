<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Item | STOCK</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<aside>

<div class="logo">STOCK.</div>

<nav>
<a href="inventory.html">Inventory</a>
<a href="categories.html">Categories</a>
<a href="order.html" class="active">Order Item</a>
<a href="history.html">Order History</a>
<a href="settings.html">Settings</a>
</nav>

<div class="account-panel">
<img src="./images/default-avatar.png" class="profile-img">
<div class="profile-info">
<strong id="username"></strong>
<span>Inventory Manager</span>
</div>
</div>

</aside>

<main>

<header>
<h1>Order Item</h1>
<p style="color:var(--text-muted)">Remove items from stock</p>
</header>

<div class="table-container">

<form id="order-form">

<div class="form-group">
<label>Select Item</label>
<select id="order-item"></select>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" id="order-qty" required>
</div>

<button class="btn">Complete Order</button>

</form>

</div>

</main>

<script type="module" src="script.js"></script>

</body>
</html>

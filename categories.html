<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categories | Minimal Inventory</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<aside>

<div class="logo">STOCK.</div>

<nav>
<a href="inventory.html">Inventory</a>
<a href="categories.html" class="active">Categories</a>
<a href="settings.html">Settings</a>
</nav>

<div class="account-panel">

<img src="https://i.pravatar.cc/60" class="profile-img">

<div class="profile-info">
<strong>Admin</strong>
<span>Inventory Manager</span>
</div>

</div>

</aside>

<!-- Main Content -->
<main>

<header>

<div>
<h1>Categories</h1>
<p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.25rem;">
Manage product categories
</p>
</div>

<div class="header-actions">
<button class="btn" onclick="openCategoryModal()">+ Add Category</button>
</div>

</header>

<div class="table-container">

<table>

<thead>
<tr>
<th>Category Name</th>
<th>Description</th>
<th>Total Products</th>
<th>Action</th>
</tr>
</thead>

<tbody id="categories-body">

</tbody>

</table>

</div>

<!-- Add/Edit Category Modal -->
<div class="modal-overlay" id="category-modal">
    <div class="modal">
        <h2>Add New Category</h2>
        <form id="add-category-form">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" id="c-name" placeholder="e.g. Top" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="c-desc" placeholder="e.g. Shirts, T-Shirts" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeCategoryModal()">Cancel</button>
                <button type="submit" class="btn">Save Category</button>
            </div>
        </form>
    </div>
</div>

</main>

<script type="module" src="script.js"></script>
</body>
</html>

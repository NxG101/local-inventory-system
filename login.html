<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-wrapper">

<div class="login-card">

<div class="login-logo">STOCK.</div>

<div class="login-title">Login</div>
<div class="login-sub">Access inventory manager</div>

<div class="error-msg" id="error">Invalid credentials</div>

<form class="login-form" id="login-form">

<div class="form-group">
    <input type="email" id="newEmail" placeholder="Email (e.g. admin@stock.com)" required>
</div>

<div class="form-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button class="btn login-btn">Login</button>

</form>

<div class="login-footer">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>

</div>

</div>

<script type="module">
import { login } from "./script.js";

document.getElementById("login-form").addEventListener("submit", function(e){
    e.preventDefault();
    login();
});
</script>

</body>
</html>

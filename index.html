<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Stock | STOCK.</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .visitor-hero {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            padding: 2.25rem 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .visitor-hero h1 {
            font-size: 2.1rem;
            margin-bottom: 0.5rem;
        }
        .visitor-hero p {
            font-size: 1.05rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.4rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
        }

        .recent-section {
            margin-top: 2.5rem;
        }
    </style>
</head>

<body>

<main style="width:100%; padding:2rem 3rem; max-width:1200px; margin:0 auto;">

    <!-- HERO -->
    <div class="visitor-hero">
        <h1>Available Stock</h1>
        <p>Real-time clothing inventory • Updated live from our warehouse</p>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="visitor-stats"></div>

    <!-- MAIN TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Size</th>
                    <th>Color</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="visitor-inventory"></tbody>
        </table>
    </div>

    <!-- RECENT ORDERS (TODAY ONLY) -->
    <div class="recent-section">
        <h3 style="margin-bottom:1rem; color:var(--text-main);">Recent Orders Today</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="recent-orders"></tbody>
            </table>
        </div>
    </div>

    <!-- AUTH BUTTONS -->
    <div class="visitor-header" style="margin-top:2rem; justify-content:flex-end;">
        <div class="auth-buttons">
            <a href="login.html"><button class="auth-btn primary">Log In</button></a>
            <a href="signup.html"><button class="auth-btn">Sign Up</button></a>
        </div>
    </div>

</main>

<script type="module">
    import { db } from "./script.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    async function loadInventory() {
        const table = document.getElementById("visitor-inventory");
        table.innerHTML = "";

        const snapshot = await getDocs(collection(db, "inventory"));
        let totalItems = 0;
        let totalValue = 0;
        let totalCategories = new Set();
        let totalStock = 0;
        let hasData = false;                    // ← NEW

        snapshot.forEach(doc => {
            const item = doc.data();
            if (item.stock > 0) {
                hasData = true;                 // ← NEW
                totalItems++;
                totalValue += (item.price || 0) * item.stock;
                totalCategories.add(item.category || "Other");
                totalStock += item.stock;

                table.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.sku || doc.id}</td>
                        <td>${item.category || "Other"}</td>
                        <td>${item.size || "-"}</td>
                        <td>${item.color || "-"}</td>
                        <td>₱${item.price}</td>
                        <td><strong>${item.stock}</strong></td>
                    </tr>
                `;
            }
        });

        if (!hasData) {
            table.innerHTML = `
                <tr>
                    <td colspan="7" style="text-align:center;color:var(--text-muted);padding:2rem;">
                        No Data Available to Show
                    </td>
                </tr>
            `;
        }        

        renderStats(totalItems, totalCategories.size, totalValue, totalStock);
        loadRecentOrdersToday();
    }

    function renderStats(totalItems, totalCategories, totalValue, totalStock) {
        const container = document.getElementById("visitor-stats");
        container.innerHTML = `
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">AVAILABLE ITEMS</div>
                <div class="stat-value">${totalItems}</div>
            </div>
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">CATEGORIES</div>
                <div class="stat-value">${totalCategories}</div>
            </div>
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">TOTAL VALUE</div>
                <div class="stat-value">₱${totalValue.toLocaleString()}</div>
            </div>
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">TOTAL STOCKS</div>
                <div class="stat-value">${totalStock}</div>
            </div>
        `;
    }

    async function loadRecentOrdersToday() {
        const tbody = document.getElementById("recent-orders");
        tbody.innerHTML = "";

        const snapshot = await getDocs(collection(db, "orders"));
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);

        const orders = [];
        snapshot.forEach(doc => {
            const order = doc.data();
            const orderDate = order.date?.toDate ? order.date.toDate() : new Date(order.date);
            if (orderDate >= todayStart) orders.push(order);
        });

        orders.sort((a, b) => (b.date?.toDate?.() || 0) - (a.date?.toDate?.() || 0));

        orders.forEach(order => {
            const dateStr = order.date ? (order.date.toDate ? order.date.toDate().toLocaleString() : new Date(order.date).toLocaleString()) : "—";

            tbody.innerHTML += `
                <tr>
                    <td>${order.itemName}</td>
                    <td>${order.quantity}</td>
                    <td>${dateStr}</td>
                </tr>
            `;
        });

        if (orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">No orders today</td></tr>`;
        }
    }

    window.onload = loadInventory;
</script>

<!-- GLOBAL NOTIFICATION BAR -->
<div id="notification" class="notification">
    <div class="notification-content">
        <span id="notification-message"></span>
    </div>
    <button class="notification-close" onclick="hideNotification()">×</button>
</div>    

</body>
</html>

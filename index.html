<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Stock | STOCK.</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .visitor-hero {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .visitor-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .visitor-hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
    </style>
</head>

<body>

<main style="width:100%; padding:2rem 3rem; max-width:1200px; margin:0 auto;">

    <!-- HERO -->
    <div class="visitor-hero">
        <h1>Available Stock</h1>
        <p>Real-time clothing inventory • Updated live from our warehouse</p>
    </div>

    <!-- STATS -->
    <div class="stats-grid" id="visitor-stats">
        <!-- Stats injected by JS -->
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Size</th>
                    <th>Color</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="visitor-inventory"></tbody>
        </table>
    </div>

    <!-- AUTH BUTTONS -->
    <div class="visitor-header" style="margin-top:2rem; justify-content:flex-end;">
        <div class="auth-buttons">
            <a href="login.html"><button class="auth-btn">Log In</button></a>
            <a href="signup.html"><button class="auth-btn primary">Sign Up</button></a>
        </div>
    </div>

</main>

<script type="module">
    import { db } from "./script.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    async function loadInventory() {
        const table = document.getElementById("visitor-inventory");
        table.innerHTML = "";

        const snapshot = await getDocs(collection(db, "inventory"));
        let totalItems = 0;
        let totalValue = 0;
        let totalCategories = new Set();

        snapshot.forEach(doc => {
            const item = doc.data();
            if (item.stock > 0) {
                totalItems++;
                totalValue += (item.price || 0) * item.stock;
                totalCategories.add(item.category || "Other");

                table.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.sku || doc.id}</td>
                        <td>${item.category || "Other"}</td>
                        <td>${item.size || "-"}</td>
                        <td>${item.color || "-"}</td>
                        <td>₱${item.price}</td>
                        <td><strong>${item.stock}</strong></td>
                    </tr>
                `;
            }
        });

        // Render stats
        renderStats(totalItems, totalCategories.size, totalValue);
    }

    function renderStats(totalItems, totalCategories, totalValue) {
        const container = document.getElementById("visitor-stats");
        container.innerHTML = `
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">AVAILABLE ITEMS</div>
                <div class="stat-value">${totalItems}</div>
            </div>
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">CATEGORIES</div>
                <div class="stat-value">${totalCategories}</div>
            </div>
            <div class="stat-card">
                <div style="color:var(--text-muted);font-size:0.85rem;">TOTAL VALUE</div>
                <div class="stat-value">₱${totalValue.toLocaleString()}</div>
            </div>
        `;
    }

    window.onload = loadInventory;
</script>

</body>
</html>
